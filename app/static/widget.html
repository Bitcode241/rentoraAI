<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervacija</title>
<style>
  :root{
    --accent:#0ea5b7; --accent-dark:#0a8090; --ink:#0f2230; --mut:#6a7e8c;
    --line:#e3ebef; --bg:#f6f9fb; --card:#ffffff; --good:#1a8a5a;
    --radius:16px; --shadow:0 6px 24px rgba(16,40,56,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:680px;margin:0 auto;padding:0 16px 120px}
  /* header */
  .hero{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);
    color:#fff;padding:28px 20px 56px;border-radius:0 0 28px 28px;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;inset:0;background:
    radial-gradient(120% 80% at 90% -10%,rgba(255,255,255,.18),transparent 60%);pointer-events:none}
  .hero h1{font-size:24px;font-weight:800;letter-spacing:-.4px;position:relative}
  .hero p{opacity:.92;font-size:14px;margin-top:4px;position:relative}
  .hero .biz{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;opacity:.85;font-weight:600}
  /* stepper */
  .steps{display:flex;gap:6px;margin:-28px auto 20px;max-width:648px;position:relative;z-index:2;padding:0 4px}
  .step{flex:1;height:5px;border-radius:99px;background:rgba(255,255,255,.45)}
  .step.done{background:#fff}
  .step.active{background:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.3)}
  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.8px;color:var(--mut);
    font-weight:700;margin-bottom:14px}
  /* asset / package tiles */
  .tile{border:2px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;
    transition:all .15s;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .tile:hover{border-color:var(--accent)}
  .tile.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 7%,#fff)}
  .tile .t-name{font-weight:700;font-size:15px}
  .tile .t-sub{font-size:13px;color:var(--mut);margin-top:2px}
  .tile .t-price{font-weight:800;font-size:16px;white-space:nowrap;color:var(--accent-dark)}
  .tick{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex:none;margin-left:12px;
    display:grid;place-items:center;font-size:13px;color:#fff}
  .tile.sel .tick{background:var(--accent);border-color:var(--accent)}
  /* inputs */
  label.fl{display:block;font-size:13px;font-weight:600;margin:12px 0 6px}
  input,select{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;
    font-size:15px;font-family:inherit;background:#fff;color:var(--ink)}
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .qty{display:flex;align-items:center;gap:0;border:1.5px solid var(--line);border-radius:11px;overflow:hidden;width:fit-content}
  .qty button{width:44px;height:44px;border:none;background:#fff;font-size:20px;cursor:pointer;color:var(--accent-dark)}
  .qty span{min-width:48px;text-align:center;font-weight:700;font-size:16px}
  /* add-ons */
  .addon{display:flex;align-items:center;gap:12px;padding:12px;border:1.5px solid var(--line);
    border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
  .addon.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 6%,#fff)}
  .addon .box{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex:none;
    display:grid;place-items:center;color:#fff;font-size:13px}
  .addon.sel .box{background:var(--accent);border-color:var(--accent)}
  .addon .a-name{font-weight:600;font-size:14px;flex:1}
  .addon .a-desc{font-size:12px;color:var(--mut);font-weight:400}
  .addon .a-price{font-weight:700;color:var(--accent-dark);font-size:14px}
  /* summary bar */
  .bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);
    box-shadow:0 -4px 20px rgba(16,40,56,.07);padding:14px 16px;z-index:30}
  .bar-in{max-width:680px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .bar .tot{flex:1}
  .bar .tot .lbl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
  .bar .tot .amt{font-size:22px;font-weight:800;letter-spacing:-.5px}
  .bar .tot .dep{font-size:12px;color:var(--mut)}
  .btn{background:var(--accent);color:#fff;border:none;padding:15px 26px;border-radius:13px;
    font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap}
  .btn:hover{background:var(--accent-dark)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-wide{width:100%}
  /* states */
  .avail{font-size:13px;margin-top:8px;font-weight:600}
  .avail.ok{color:var(--good)}
  .avail.no{color:#c0392b}
  .muted{color:var(--mut);font-size:13px}
  .center{text-align:center;padding:40px 20px}
  .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hide{display:none!important}
  .success{text-align:center;padding:30px 20px}
  .success .ico{width:64px;height:64px;border-radius:50%;background:var(--good);color:#fff;
    display:grid;place-items:center;font-size:32px;margin:0 auto 16px}
  .powered{text-align:center;font-size:11px;color:var(--mut);padding:16px;opacity:.7}
  .powered b{color:var(--accent-dark)}
</style>
</head>
<body>
  <div class="hero">
    <div class="biz" id="biz">—</div>
    <h1 id="title">Rezerviraj online</h1>
    <p>Odaberi, plati depozit, gotovo. Ostatak na licu mjesta.</p>
  </div>
  <div class="steps" id="steps">
    <div class="step active"></div><div class="step"></div>
    <div class="step"></div><div class="step"></div>
  </div>

  <div class="wrap">
    <div id="loading" class="center"><div class="spinner"></div><div class="muted">Učitavam…</div></div>

    <div id="app" class="hide">
      <!-- step 1: asset -->
      <div class="card" id="s-asset">
        <h2>1 · Odaberi</h2>
        <div id="assets"></div>
      </div>
      <!-- step 2: package + when + people -->
      <div class="card hide" id="s-pkg">
        <h2>2 · Paket i termin</h2>
        <div id="packages"></div>
        <div class="row2" style="margin-top:6px">
          <div><label class="fl">Datum</label><input type="date" id="date"></div>
          <div><label class="fl">Vrijeme</label><input type="time" id="time" value="09:00"></div>
        </div>
        <label class="fl">Broj osoba</label>
        <div class="qty">
          <button onclick="chPax(-1)">−</button><span id="pax">1</span><button onclick="chPax(1)">+</button>
        </div>
        <div id="extra-note" style="display:none;font-size:13px;color:var(--accent-dark);font-weight:600;margin-top:6px"></div>
        <label class="fl" id="qty-label">Koliko komada</label>
        <div class="qty">
          <button onclick="chQty(-1)">−</button><span id="qty">1</span><button onclick="chQty(1)">+</button>
        </div>
        <div class="avail" id="avail"></div>
      </div>
      <!-- step 3: add-ons -->
      <div class="card hide" id="s-addons">
        <h2>3 · Dodaci (nije obavezno)</h2>
        <div id="addons"></div>
        <div id="transfer-box" style="margin-top:16px;border-top:1px solid var(--line);padding-top:14px">
          <div style="font-weight:700;font-size:14px;margin-bottom:4px" id="tr-title">Trebate li transfer?</div>
          <div style="font-size:12px;color:var(--mut);margin-bottom:10px" id="tr-sub">Upišite odakle vas vozimo i izračunat ćemo cijenu.</div>
          <div style="display:flex;gap:6px">
            <input id="tr-loc" placeholder="npr. Hotel Kompas, Lapad" style="flex:1">
            <button class="btn btn-sm" id="tr-btn" onclick="quoteTransfer()" style="padding:10px 14px">Izračunaj</button>
          </div>
          <label style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:13px;cursor:pointer">
            <input id="tr-round" type="checkbox" style="width:auto" onchange="if(S.transfer)quoteTransfer()"> <span id="tr-roundlbl">Povratni prijevoz (tamo i natrag)</span>
          </label>
          <div id="tr-result" style="margin-top:10px;font-size:14px"></div>
        </div>
      </div>
      <!-- step 4: details -->
      <div class="card hide" id="s-details">
        <h2>4 · Tvoji podaci</h2>
        <label class="fl">Ime i prezime</label><input id="g_name" placeholder="Ivan Horvat">
        <label class="fl">Email</label><input id="g_email" type="email" placeholder="ivan@email.com">
        <label class="fl">Telefon (WhatsApp/Viber)</label><input id="g_phone" placeholder="+385 …">
        <div class="avail no hide" id="err" style="margin-top:12px"></div>
      </div>
    </div>

    <div id="done" class="hide"></div>
    <div class="powered">Powered by <b>RentoraAI</b></div>
  </div>

  <!-- sticky summary bar -->
  <div class="bar hide" id="bar">
    <div class="bar-in">
      <div class="tot">
        <div class="lbl">Ukupno</div>
        <div class="amt" id="bar-amt">—</div>
        <div class="dep" id="bar-dep"></div>
      </div>
      <button class="btn" id="bar-btn" onclick="next()">Dalje</button>
    </div>
  </div>

<script>
const TYPE = location.pathname.split('/').pop() || 'jetski';
const API = '/api/public';
// Language: ?lang=en in the URL wins, else the browser language, else Croatian.
const LANG = (()=>{
  const q=new URLSearchParams(location.search).get('lang');
  const l=(q||navigator.language||'hr').slice(0,2).toLowerCase();
  return ['hr','en','de'].includes(l)?l:'en';
})();
const I18N={
  hr:{title:'Rezerviraj online',sub:'Odaberi, plati depozit, gotovo. Ostatak na licu mjesta.',
    s1:'1 · Odaberi',s2:'2 · Paket i termin',s3:'3 · Dodaci (nije obavezno)',s4:'4 · Tvoji podaci',
    date:'Datum',time:'Vrijeme',people:'Broj osoba',name:'Ime i prezime',email:'Email',
    phone:'Telefon (WhatsApp/Viber)',total:'Ukupno',next:'Dalje',pay:'Plati depozit',
    upto:'do',persons:'osoba',deposit:'depozit',from:'od',perPerson:'po osobi',
    extraPerson:'za dodatnu osobu',pastDate:'Ne možete rezervirati datum u prošlosti. Odaberite budući termin.',tooSoon:'Rezervacija mora biti najmanje {h}h unaprijed. Odaberite kasniji termin.',trTitle:'Trebate li transfer?',trSub:'Upišite odakle vas vozimo i izračunat ćemo cijenu.',trCalc:'Izračunaj',trRound:'Povratni prijevoz (tamo i natrag)',trPrice:'Transfer',trRemove:'ukloni',trUnknown:'Za tu lokaciju javit ćemo cijenu emailom.',qty:'Koliko komada',fleet:'u floti',freeNow:n=>`${n} slobodno za ovaj termin`,
    checking:'Provjeravam…',free:'✓ Slobodno za odabrani termin',busy:'✗ Zauzeto — probaj drugi termin',
    noUnits:'Trenutno nema dostupnih jedinica.',noAddons:'Nema dodataka.',min:'min',
    depNow:n=>`Sada platiš depozit ${n} · ostatak na licu mjesta`,loading:'Učitavam…',
    errEmail:'Upiši ispravan email.',errName:'Upiši ime i prezime.',preparing:'Pripremam…',
    taken:'Termin je upravo zauzet. Odaberi drugi.',wrong:'Nešto je pošlo po zlu. Pokušaj ponovno.',
    netErr:'Greška u mreži. Pokušaj ponovno.',loadErr:'Greška pri učitavanju. Pokušaj ponovno.'},
  en:{title:'Book online',sub:'Choose, pay the deposit, done. Balance on site.',
    s1:'1 · Choose',s2:'2 · Package & time',s3:'3 · Add-ons (optional)',s4:'4 · Your details',
    date:'Date',time:'Time',people:'Guests',name:'Full name',email:'Email',
    phone:'Phone (WhatsApp/Viber)',total:'Total',next:'Next',pay:'Pay deposit',
    upto:'up to',persons:'guests',deposit:'deposit',from:'from',perPerson:'per person',
    extraPerson:'for extra person',pastDate:'You can\'t book a date in the past. Please choose an upcoming time.',tooSoon:'Bookings must be at least {h}h in advance. Please pick a later time.',trTitle:'Need a transfer?',trSub:'Enter your pickup location and we\'ll price it.',trCalc:'Calculate',trRound:'Round trip (there and back)',trPrice:'Transfer',trRemove:'remove',trUnknown:'We\'ll email you a price for that location.',qty:'How many',fleet:'in fleet',freeNow:n=>`${n} free for this time`,
    checking:'Checking…',free:'✓ Available for this time',busy:'✗ Taken — try another time',
    noUnits:'No units available right now.',noAddons:'No add-ons.',min:'min',
    depNow:n=>`Pay a ${n} deposit now · balance on site`,loading:'Loading…',
    errEmail:'Enter a valid email.',errName:'Enter your full name.',preparing:'Preparing…',
    taken:'That slot was just taken. Pick another.',wrong:'Something went wrong. Try again.',
    netErr:'Network error. Try again.',loadErr:'Loading error. Try again.'},
  de:{title:'Online buchen',sub:'Wählen, Anzahlung zahlen, fertig. Rest vor Ort.',
    s1:'1 · Wählen',s2:'2 · Paket & Zeit',s3:'3 · Extras (optional)',s4:'4 · Ihre Daten',
    date:'Datum',time:'Uhrzeit',people:'Personen',name:'Vollständiger Name',email:'E-Mail',
    phone:'Telefon (WhatsApp/Viber)',total:'Gesamt',next:'Weiter',pay:'Anzahlung zahlen',
    upto:'bis',persons:'Personen',deposit:'Anzahlung',from:'ab',perPerson:'pro Person',
    extraPerson:'für Zusatzperson',pastDate:'Vergangene Termine sind nicht buchbar. Bitte wählen Sie einen zukünftigen Termin.',tooSoon:'Buchungen müssen mind. {h}h im Voraus erfolgen. Bitte später wählen.',trTitle:'Transfer benötigt?',trSub:'Abholort eingeben, wir berechnen den Preis.',trCalc:'Berechnen',trRound:'Hin- und Rückfahrt',trPrice:'Transfer',trRemove:'entfernen',trUnknown:'Für diesen Ort senden wir den Preis per E-Mail.',qty:'Wie viele',fleet:'in Flotte',freeNow:n=>`${n} frei für diese Zeit`,
    checking:'Prüfe…',free:'✓ Verfügbar für diese Zeit',busy:'✗ Belegt — andere Zeit wählen',
    noUnits:'Derzeit keine Einheiten verfügbar.',noAddons:'Keine Extras.',min:'Min',
    depNow:n=>`Jetzt ${n} Anzahlung · Rest vor Ort`,loading:'Lädt…',
    errEmail:'Gültige E-Mail eingeben.',errName:'Namen eingeben.',preparing:'Bereite vor…',
    taken:'Termin gerade vergeben. Anderen wählen.',wrong:'Etwas ging schief. Erneut versuchen.',
    netErr:'Netzwerkfehler. Erneut versuchen.',loadErr:'Ladefehler. Erneut versuchen.'},
};
const T=I18N[LANG];
let CFG={}, ASSETS=[], ADDONS=[], S={asset:null,pkg:null,pax:1,qty:1,addons:new Set(),step:1,avail:null,free:0,transfer:null};

const money=n=>new Intl.NumberFormat(LANG+'-'+(LANG==='en'?'GB':LANG.toUpperCase()),{style:'currency',currency:CFG.currency||'EUR',maximumFractionDigits:0}).format(n||0);
const $=id=>document.getElementById(id);

async function init(){
  document.documentElement.lang=LANG;
  // apply static labels
  $('title').textContent=T.title;
  document.querySelector('.hero p').textContent=T.sub;
  $('s-asset').querySelector('h2').textContent=T.s1;
  $('s-pkg').querySelector('h2').textContent=T.s2;
  $('s-addons').querySelector('h2').textContent=T.s3;
  $('s-details').querySelector('h2').textContent=T.s4;
  document.querySelectorAll('.fl').forEach(el=>{
    const m={'Datum':T.date,'Vrijeme':T.time,'Broj osoba':T.people,
      'Ime i prezime':T.name,'Email':T.email,'Telefon (WhatsApp/Viber)':T.phone};
    if(m[el.textContent]) el.textContent=m[el.textContent];
  });
  $('g_name').placeholder=LANG==='en'?'John Smith':LANG==='de'?'Max Mustermann':'Ivan Horvat';
  $('bar').querySelector('.lbl').textContent=T.total;
  const ql=$('qty-label'); if(ql) ql.textContent=T.qty;
  if($('tr-title')) $('tr-title').textContent=T.trTitle;
  if($('tr-sub')) $('tr-sub').textContent=T.trSub;
  if($('tr-btn')) $('tr-btn').textContent=T.trCalc;
  if($('tr-roundlbl')) $('tr-roundlbl').textContent=T.trRound;
  $('loading').querySelector('.muted').textContent=T.loading;
  try{
    [CFG, ASSETS, ADDONS] = await Promise.all([
      fetch(`${API}/config?asset_type=${TYPE}`).then(r=>r.json()),
      fetch(`${API}/assets?asset_type=${TYPE}`).then(r=>r.json()),
      fetch(`${API}/addons?asset_type=${TYPE}`).then(r=>r.json()),
    ]);
    applyTheme();
    $('biz').textContent = CFG.business_name||'';
    $('loading').classList.add('hide'); $('app').classList.remove('hide'); $('bar').classList.remove('hide');
    renderAssets();
    const d=new Date(Date.now()+864e5); $('date').value=d.toISOString().slice(0,10);
    $('date').min=new Date().toISOString().slice(0,10);
    ['date','time'].forEach(id=>$(id).addEventListener('change',checkAvail));
    updateBar();
  }catch(e){ $('loading').innerHTML=`<div class="muted">${T.loadErr}</div>`; }
}
function applyTheme(){
  const a=CFG.accent||'#0ea5b7';
  document.documentElement.style.setProperty('--accent',a);
  document.documentElement.style.setProperty('--accent-dark',shade(a,-18));
}
function shade(hex,p){const n=parseInt(hex.slice(1),16);let r=(n>>16)+p*2.55,g=(n>>8&255)+p*2.55,b=(n&255)+p*2.55;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+(1<<24|r<<16|g<<8|b).toString(16).slice(1);}

function renderAssets(){
  $('assets').innerHTML = ASSETS.map(a=>{
    const from = a.packages.length?Math.min(...a.packages.map(p=>p.price)):0;
    return `<div class="tile ${S.asset&&S.asset.id===a.id?'sel':''}" onclick="pickAsset(${a.id})">
      <div><div class="t-name">${a.name}</div>
      <div class="t-sub">${T.upto} ${a.capacity} ${T.persons}${a.description&&a.description!==a.name?' · '+a.description:''}</div></div>
      <div style="display:flex;align-items:center">
      <div class="t-price">${T.from} ${money(from)}</div>
      <div class="tick">${S.asset&&S.asset.id===a.id?'✓':''}</div></div>
    </div>`;
  }).join('') || `<div class="muted">${T.noUnits}</div>`;
}
function pickAsset(id){
  S.asset=ASSETS.find(a=>a.id===id); S.pkg=null; S.avail=null;
  renderAssets(); renderPackages();
  $('s-pkg').classList.remove('hide'); setStep(2);
  $('s-pkg').scrollIntoView({behavior:'smooth',block:'start'});
  updateBar();
}
function renderPackages(){
  $('packages').innerHTML = S.asset.packages.map(p=>`
    <div class="tile ${S.pkg&&S.pkg.id===p.id?'sel':''}" onclick="pickPkg(${p.id})">
      <div><div class="t-name">${p.name}</div>
      <div class="t-sub">${p.duration_minutes} ${T.min} · ${T.deposit} ${money(p.deposit)}</div></div>
      <div style="display:flex;align-items:center">
      <div class="t-price">${money(p.price)}</div>
      <div class="tick">${S.pkg&&S.pkg.id===p.id?'✓':''}</div></div>
    </div>`).join('');
}
function pickPkg(id){ S.pkg=S.asset.packages.find(p=>p.id===id); renderPackages(); checkAvail(); updateBar(); }
function maxPax(){
  // jet skis hold exactly 2 people each — never more. Other types use capacity.
  const perUnit = (TYPE==='jetski') ? 2 : ((S.asset&&S.asset.capacity)||2);
  return perUnit*Math.max(1,S.qty);
}
function chPax(d){ S.pax=Math.max(1,Math.min(maxPax(),S.pax+d)); $('pax').textContent=S.pax; renderAddons(); showExtra(); updateBar(); }
function chQty(d){ const max=S.free||((S.asset&&S.asset.fleet_size)||1);
  S.qty=Math.max(1,Math.min(max,S.qty+d)); $('qty').textContent=S.qty;
  // at least one person per unit (5 jets -> at least 5 people)
  if(S.pax<S.qty) S.pax=S.qty;
  if(S.pax>maxPax()) S.pax=maxPax();   // and never above 2 per unit
  $('pax').textContent=S.pax;
  showExtra(); updateBar(); }
function showExtra(){
  const ex=extraPersonTotal(); const el=$('extra-note');
  if(el){ if(ex>0){ el.textContent=`+ ${money(ex)} ${T.extraPerson}`; el.style.display='block'; }
    else el.style.display='none'; }
}

async function checkAvail(){
  if(!S.asset||!S.pkg||!$('date').value){return;}
  const start=`${$('date').value}T${$('time').value||'09:00'}:00`;
  $('avail').textContent=T.checking; $('avail').className='avail muted';
  try{
    const r=await fetch(`${API}/availability?asset_id=${S.asset.id}&package_id=${S.pkg.id}&start=${encodeURIComponent(start)}&qty=${S.qty}`).then(x=>x.json());
    S.avail=r.available; S.free=r.free||0;
    // cap requested qty to what's free
    if(S.qty>S.free && S.free>0){ S.qty=S.free; $('qty').textContent=S.qty; }
    if(S.free>0){
      $('avail').textContent = `${r.available?T.free:T.busy} · ${T.freeNow(S.free)}`;
      $('avail').className = 'avail '+(r.available?'ok':'no');
    } else {
      $('avail').textContent = T.busy; $('avail').className='avail no';
    }
  }catch(e){ S.avail=null; S.free=0; $('avail').textContent=''; }
  updateBar();
}

function renderAddons(){
  if(!ADDONS.length){ $('addons').innerHTML=`<div class="muted">${T.noAddons}</div>`; return; }
  $('addons').innerHTML = ADDONS.map(a=>{
    const price = a.per_person ? a.price*S.pax : a.price;
    return `<div class="addon ${S.addons.has(a.id)?'sel':''}" onclick="toggleAddon(${a.id})">
      <div class="box">${S.addons.has(a.id)?'✓':''}</div>
      <div class="a-name">${a.name}${a.description?`<div class="a-desc">${a.description}</div>`:''}
      ${a.per_person?`<div class="a-desc">${T.perPerson}</div>`:''}</div>
      <div class="a-price">+${money(price)}</div>
    </div>`;
  }).join('');
}
function toggleAddon(id){ S.addons.has(id)?S.addons.delete(id):S.addons.add(id); renderAddons(); updateBar(); }

function addonsTotal(){
  let t=0; ADDONS.forEach(a=>{ if(S.addons.has(a.id)) t+=a.per_person?a.price*S.pax:a.price; }); return t;
}
function extraPersonTotal(){
  // jet ski only: each jet's 2nd person costs extra (passengers - qty), never below 0
  if(TYPE!=='jetski') return 0;
  const fee=CFG.extra_person_fee||0;
  const extra=Math.max(0, S.pax - S.qty);
  return fee*extra;
}
function total(){ return (S.pkg?S.pkg.price*S.qty:0)+addonsTotal()+extraPersonTotal()+(S.transfer?S.transfer.price:0); }
function deposit(){
  // package deposit (× qty) + FULL add-ons + FULL transfer up front; extra-person on site
  const base=S.pkg?S.pkg.deposit*S.qty:0;
  return base+addonsTotal()+(S.transfer?S.transfer.price:0);
}
async function quoteTransfer(){
  const loc=$('tr-loc').value.trim();
  const res=$('tr-result'); const btn=$('tr-btn');
  if(loc.length<2){ res.innerHTML=''; S.transfer=null; updateBar(); return; }
  btn.disabled=true; res.innerHTML=`<span class="muted">${T.checking}</span>`;
  const rt=$('tr-round').checked;
  try{
    const r=await fetch(`${API}/transfer-quote?location=${encodeURIComponent(loc)}&passengers=${S.pax}&round_trip=${rt}`).then(x=>x.json());
    if(r.ok){
      S.transfer={location:loc,price:r.price,round_trip:rt};
      res.innerHTML=`<span style="color:var(--good);font-weight:700">✓ ${T.trPrice}: ${money(r.price)}</span>
        <button onclick="clearTransfer()" style="margin-left:8px;background:none;border:none;color:var(--mut);cursor:pointer;text-decoration:underline;font-size:12px">${T.trRemove}</button>`;
    } else {
      S.transfer=null;
      res.innerHTML=`<span style="color:var(--mut)">${T.trUnknown}</span>`;
    }
  }catch(e){ S.transfer=null; res.innerHTML=`<span class="muted">${T.netErr}</span>`; }
  btn.disabled=false; updateBar();
}
function clearTransfer(){ S.transfer=null; $('tr-loc').value=''; $('tr-result').innerHTML=''; updateBar(); }

function updateBar(){
  $('bar-amt').textContent = money(total());
  $('bar-dep').textContent = S.pkg?T.depNow(money(deposit())):'';
  const btn=$('bar-btn');
  if(S.step===1){ btn.textContent=T.next; btn.disabled=!S.asset; }
  else if(S.step===2){ btn.textContent=T.next; btn.disabled=!(S.pkg&&S.avail===true); }
  else if(S.step===3){ btn.textContent=T.next; btn.disabled=false; }
  else if(S.step===4){ btn.textContent=T.pay; btn.disabled=false; }
}
function setStep(n){ S.step=n;
  document.querySelectorAll('.step').forEach((el,i)=>{el.className='step'+(i<n-1?' done':i===n-1?' active':'');});
  updateBar();
}
function next(){
  if(S.step===1){ if(!S.asset)return; S.step=2; $('s-pkg').classList.remove('hide'); setStep(2);
    $('s-pkg').scrollIntoView({behavior:'smooth'}); }
  else if(S.step===2){ if(!(S.pkg&&S.avail===true))return; renderAddons();
    $('s-addons').classList.remove('hide'); setStep(3); $('s-addons').scrollIntoView({behavior:'smooth'}); }
  else if(S.step===3){ $('s-details').classList.remove('hide'); setStep(4);
    $('s-details').scrollIntoView({behavior:'smooth'}); }
  else if(S.step===4){ submit(); }
}

async function submit(){
  const name=$('g_name').value.trim(), email=$('g_email').value.trim(), phone=$('g_phone').value.trim();
  $('err').classList.add('hide');
  if(!email||!email.includes('@')){ showErr(T.errEmail); return; }
  if(!name){ showErr(T.errName); return; }
  const btn=$('bar-btn'); btn.disabled=true; btn.textContent=T.preparing;
  const start=`${$('date').value}T${$('time').value||'09:00'}:00`;
  try{
    const r=await fetch(`${API}/book`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({asset_id:S.asset.id,package_id:S.pkg.id,start,qty:S.qty,passengers:S.pax,
        name,email,phone,addon_ids:[...S.addons],lang:LANG,
        transfer_location:S.transfer?S.transfer.location:'',transfer_round_trip:S.transfer?S.transfer.round_trip:false})}).then(x=>x.json());
    if(r.checkout_url){
      // Stripe Checkout refuses to load inside an iframe. If we're embedded,
      // redirect the TOP window; otherwise redirect normally.
      try{
        if(window.top && window.top!==window.self){ window.top.location.href=r.checkout_url; }
        else { window.location.href=r.checkout_url; }
      }catch(e){
        // cross-origin parent: open Stripe in a new tab as a fallback
        window.open(r.checkout_url,'_blank');
        btn.disabled=false; btn.textContent=T.pay;
      }
    }
    else if(r.error==='not_available'){ showErr(T.taken); reset(); }
    else if(r.error==='past_date'){ showErr(T.pastDate); btn.disabled=false; btn.textContent=T.pay; }
    else if(r.error==='too_soon'){ showErr(T.tooSoon.replace('{h}', r.lead_time_hours||2)); btn.disabled=false; btn.textContent=T.pay; }
    else { showErr(T.wrong); btn.disabled=false; btn.textContent=T.pay; }
  }catch(e){ showErr(T.netErr); btn.disabled=false; btn.textContent=T.pay; }
}
function showErr(m){ $('err').textContent=m; $('err').classList.remove('hide'); }
function reset(){ const b=$('bar-btn'); b.disabled=false; b.textContent=T.pay; }

init();
</script>
</body>
</html>
