<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Voucher</title>
<style>
  :root{
    --teal:#0f6a7d; --teal-dark:#0a4d5c; --gold:#c8a45c;
    --ink:#0d2b32; --mut:#5a6b6f; --line:#e3ebec; --bg:#f3f7f8;
    --good:#1a8a5a;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--ink);min-height:100vh}
  .wrap{max-width:440px;margin:0 auto;padding:0 0 40px}
  .hero{background:linear-gradient(160deg,var(--teal) 0%,var(--teal-dark) 100%);
    color:#fff;padding:26px 22px 22px;border-radius:0 0 22px 22px}
  .hero .biz{font-size:13px;letter-spacing:.08em;text-transform:uppercase;opacity:.85}
  .hero h1{margin:4px 0 0;font-size:21px;font-weight:700}
  .hero .sub{font-size:13px;opacity:.8;margin-top:2px}
  .badge{display:inline-block;margin-top:12px;font-size:12px;font-weight:700;
    padding:4px 11px;border-radius:20px;letter-spacing:.04em}
  .b-partner{background:rgba(200,164,92,.25);color:#ffe6b8}
  .b-own{background:rgba(255,255,255,.2);color:#fff}
  .collect{margin:18px 16px 0;background:#fff;border-radius:18px;
    box-shadow:0 6px 24px rgba(13,43,50,.08);padding:22px;text-align:center}
  .collect .lab{font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
  .collect .amt{font-size:44px;font-weight:800;color:var(--gold);margin:6px 0 0;line-height:1}
  .collect .note{font-size:13px;color:var(--mut);margin-top:8px}
  .card{margin:14px 16px 0;background:#fff;border-radius:16px;
    box-shadow:0 4px 16px rgba(13,43,50,.05);overflow:hidden}
  .row{display:flex;justify-content:space-between;gap:14px;padding:13px 18px;
    border-bottom:1px solid var(--line);font-size:14px}
  .row:last-child{border-bottom:0}
  .row .k{color:var(--mut)}
  .row .v{font-weight:600;text-align:right}
  .pay{display:flex;justify-content:space-between;padding:11px 18px;font-size:14px}
  .pay.paid{color:var(--mut)}
  .pay.due{font-weight:700;color:var(--gold);background:rgba(200,164,92,.07)}
  .pay.total{border-top:1px solid var(--line);font-weight:700}
  .pw{text-align:center;font-size:11px;color:#9fb0bb;margin-top:24px}
  .loading,.error{text-align:center;padding:60px 24px;color:var(--mut)}
  a.call{display:block;margin:14px 16px 0;text-align:center;background:var(--teal);
    color:#fff;text-decoration:none;padding:13px;border-radius:12px;font-weight:600}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Učitavanje…</div>
</div>
<script>
const $=id=>document.getElementById(id);
const money=(n,c)=>new Intl.NumberFormat('hr-HR',{style:'currency',currency:c||'EUR'}).format(n||0);
const token=location.pathname.split('/v/')[1]||'';

async function load(){
  let d;
  try{ d=await fetch('/api/v/'+encodeURIComponent(token)).then(r=>r.json()); }
  catch(e){ return fail(); }
  if(!d||!d.ok) return fail();
  render(d);
}
function fail(){
  $('app').innerHTML='<div class="error"><h2>Voucher nije pronađen</h2>'+
    '<p>Provjerite QR kod ili kontaktirajte agenciju.</p></div>';
}
function render(d){
  const isP=d.provider_type==='partner';
  const badge=isP
    ? `<span class="badge b-partner">PARTNER${d.provider_name?' · '+d.provider_name:''}</span>`
    : `<span class="badge b-own">VLASTITI IZLET</span>`;
  const collectBlock = d.to_collect>0 ? `
    <div class="collect">
      <div class="lab">Za naplatiti na licu mjesta</div>
      <div class="amt">${money(d.to_collect,d.currency)}</div>
      <div class="note">${isP?'Gost plaća izravno izvođaču':'Preostali iznos'}</div>
    </div>` : `
    <div class="collect">
      <div class="lab">Naplata</div>
      <div class="amt" style="color:var(--good);font-size:30px">Plaćeno u cijelosti</div>
    </div>`;
  $('app').innerHTML = `
    <div class="hero">
      <div class="biz">${d.business||'Voucher'}</div>
      <h1>Rezervacija #${d.booking_id}</h1>
      <div class="sub">${d.asset}${d.tour?' · '+d.tour:''}</div>
      ${badge}
    </div>
    ${collectBlock}
    <div class="card">
      <div class="row"><span class="k">Datum i vrijeme</span><span class="v">${d.when}</span></div>
      <div class="row"><span class="k">Gost</span><span class="v">${d.guest}</span></div>
      <div class="row"><span class="k">Broj osoba</span><span class="v">${d.guests}</span></div>
      ${d.pickup?`<div class="row"><span class="k">Mjesto polaska</span><span class="v">${d.pickup}</span></div>`:''}
      ${d.note?`<div class="row"><span class="k">Napomena</span><span class="v">${d.note}</span></div>`:''}
    </div>
    <div class="card">
      <div class="pay paid"><span>${isP?'Plaćeno putem agencije':'Plaćeno online'}</span><span>${money(d.paid_online,d.currency)}</span></div>
      <div class="pay due"><span>Za naplatiti na brodu</span><span>${money(d.to_collect,d.currency)}</span></div>
      <div class="pay total"><span>Ukupna cijena</span><span>${money(d.total,d.currency)}</span></div>
    </div>
    ${d.phone?`<a class="call" href="tel:${d.phone}">Nazovi gosta: ${d.phone}</a>`:''}
    <div class="pw">Powered by <b>RentoraAI</b></div>`;
}
load();
</script>
</body>
</html>
