services:
  db:
    image: postgres:16-alpine
    container_name: rental-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rental}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rental_pass}
      POSTGRES_DB: ${POSTGRES_DB:-rental}
    volumes:
      - rental_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rental}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: rental-os
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    volumes:
      - rental_data:/app/data
      - rental_logs:/app/logs
      # Mount Google credentials if you have them (optional):
      # - ./credentials.json:/app/credentials.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  rental_data:
  rental_logs:
  rental_pgdata:
